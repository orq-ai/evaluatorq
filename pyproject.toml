[build-system]
requires = [ "hatchling" ]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = [ "src/evaluatorq" ]
include = [ "src/evaluatorq/py.typed", "src/evaluatorq/**/*.css", "src/evaluatorq/**/*.js" ]

[tool.hatch.build.targets.sdist]
exclude = [ "examples/", ".venv/", "tests/" ]

[tool.pytest.ini_options]
testpaths = [ "tests" ]
python_files = [ "test_*.py", "*_test.py" ]
norecursedirs = [ ".venv", "dist", "*.egg-info" ]
markers = [
  "integration: marks tests as integration tests (require ORQ_API_KEY in .env)"
]
timeout = 120

[tool.ruff]
line-length = 120
preview = true
src = [ "src" ]

  [tool.ruff.format]
  quote-style = "single"

  [tool.ruff.lint]
  select = [
  "E",
  "F",
  "W",
  "FAST",
