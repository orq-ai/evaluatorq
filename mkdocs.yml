site_name: evaluatorq
site_description: Run LLM evaluations, red-team agents, and simulate multi-turn conversations in Python.
site_url: https://orq-ai.github.io/evaluatorq/
repo_url: https://github.com/orq-ai/evaluatorq
repo_name: orq-ai/evaluatorq
docs_dir: docs
copyright: "© 2026 Orq AI · MIT License"

# Keep skill scratch (plans/specs) out of build.
exclude_docs: |
  superpowers/

theme:
  name: material
  logo: assets/orq-mark-white.svg
  favicon: assets/orq-favicon.svg
  font:
    text: Inter
    code: JetBrains Mono
  # Feature set mirrors Pydantic's docs (Material for MkDocs), minus the
  # Insiders-only ones (navigation.path, instant.prefetch/preview, tabs.sticky)
  # that would fail `mkdocs build --strict` on the community edition.
  features:
    - content.tabs.link
    - content.code.annotate
    - content.code.copy
    - navigation.tabs
    - navigation.instant
    - navigation.instant.progress
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.tracking
    - navigation.footer
    - search.suggest
    - search.highlight
    - toc.follow
  # 3-way auto / light / dark toggle (same UX as Pydantic), Orq palette.
  palette:
    - media: "(prefers-color-scheme)"
      primary: custom
      accent: custom
      toggle: { icon: material/brightness-auto, name: Switch to light mode }
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle: { icon: material/brightness-7, name: Switch to dark mode }
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle: { icon: material/brightness-4, name: Switch to system preference }

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - js/keyboard.js

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/orq-ai/evaluatorq
      name: evaluatorq on GitHub

plugins:
  - search
  - gen-files:
      scripts:
        - docs/gen_pages.py
  - literate-nav:
      nav_file: SUMMARY.md
  - section-index
  # Animated terminal blocks (Typer/FastAPI style). Mark a fence with
  # `<!-- termynal -->` to type it out with a cursor + fake progress.
  - termynal:
      prompt_literal_start:
        - "$"
        - ">>>"
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: false
            show_root_heading: false
            members_order: source
            docstring_options:
              warn_unknown_params: false
              warn_missing_types: false

markdown_extensions:
  - tables
  - attr_list
  - md_in_html
  - admonition
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true

# nav GROWS PER TASK. Each task appends pages it creates to keep a
# green `mkdocs build --strict`. Never list a page before the task creates it
# (mkdocs --strict fails on a nav entry whose file is missing). Task 1 ships
# Home only; final nav shape recorded under "Target nav" in the File Structure.
nav:
  - Home: index.md
  - Get Started:
      - Getting Started: guides/getting-started.md
      - Agent Simulation:
          - guides/agent-simulation.md
          - Simulate an OpenAI agent: guides/agent-simulation-openai.md
      - Red Teaming:
          - guides/red-teaming.md
          - Red-team an OpenAI model: guides/red-teaming-openai.md
          - Custom Evaluators & Frameworks: custom-evaluators-and-frameworks.md
  - Examples: examples/
  - API Reference: reference/
  - About:
      - Contributing: contributing.md
      - Changelog: changelog.md
      - Roadmap: roadmap.md
